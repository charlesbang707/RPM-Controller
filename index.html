<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truck RPM Pro</title>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 20px; overflow: hidden; user-select: none; }
        #statusText { font-size: 14px; color: #ff3b30; margin-bottom: 10px; font-weight: bold; }
        .gauge-box { position: relative; width: 340px; height: 340px; margin: 0 auto; }
        canvas { width: 340px; height: 340px; }
        .val-text { font-size: 50px; font-weight: bold; color: #007aff; font-family: monospace; margin: 5px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 340px; margin: 10px auto; }
        button { height: 70px; border-radius: 20px; border: none; font-size: 18px; font-weight: bold; color: white; background: #2c2c2e; transition: transform 0.1s; }
        button:active { transform: scale(0.95); background: #3a3a3c; }
        .res { background: #34c759; } .stp { background: #ff3b30; } .up { background: #007aff; } .dn { background: #ff9500; }
        .speed-bar { display: flex; flex-direction: column; align-items: center; margin-top: 15px; gap: 8px; }
        .speed-btns { display: flex; gap: 10px; }
        .speed-btn { height: 40px; font-size: 14px; padding: 0 20px; border: 2px solid #444; border-radius: 10px; background: #1c1c1e; color: #888; }
        .active-speed { border-color: #007aff; color: white; background: #007aff !important; }
    </style>
</head>
<body>
    <div id="statusText">장치 연결 필요</div>
    <button onclick="connect()" style="background:#444; height:40px; padding:0 30px; border-radius:10px; margin-bottom:10px;">CONNECT</button>
    
    <div class="gauge-box"><canvas id="gauge" width="680" height="680"></canvas></div>
    <div id="targetDisplay" class="val-text">0</div>

    <div class="grid">
        <button class="res" onclick="send(1000)">RESUME</button>
        <button class="up" ontouchstart="startAdjust(25)" ontouchend="stopAdjust()">UP</button>
        <button class="stp" onclick="send(600)">STOP</button>
        <button class="dn" ontouchstart="startAdjust(-25)" ontouchend="stopAdjust()">DOWN</button>
    </div>

    <div class="speed-bar">
        <div id="baudInfo" style="color:#007aff; font-size:14px;">현재 속도: 확인 중...</div>
        <div class="speed-btns">
            <button id="btn250" class="speed-btn" onclick="send(0x2500)">250kbps</button>
            <button id="btn500" class="speed-btn" onclick="send(0x5000)">500kbps</button>
        </div>
    </div>

<script>
    let char, tarRPM = 0, curRPM = 0, adjustTimer = null;
    const canvas = document.getElementById('gauge'), ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');

    async function send(v) { 
        if(char) {
            try { await char.writeValue(new Uint8Array([v & 0xFF, (v >> 8) & 0xFF])); } catch(e) {}
        }
    }

    async function connect() {
        try {
            const dev = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] });
            const srv = await dev.gatt.connect();
            const svc = await srv.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
            char = await svc.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
            await char.startNotifications();
            
            statusText.innerText = "연결됨: " + dev.name;
            statusText.style.color = "#34c759";

            char.addEventListener('characteristicvaluechanged', (e) => {
                let v = e.target.value;
                curRPM = v.getUint16(0, true);
                tarRPM = v.getUint16(2, true);
                let is500 = v.getUint8(4);
                
                document.getElementById('btn500').className = is500 ? "speed-btn active-speed" : "speed-btn";
                document.getElementById('btn250').className = !is500 ? "speed-btn active-speed" : "speed-btn";
                document.getElementById('baudInfo').innerText = "현재 속도: " + (is500 ? "500kbps (Western Star)" : "250kbps (Mack)");
                document.getElementById('targetDisplay').innerText = tarRPM;
            });
        } catch (e) { statusText.innerText = "연결 실패"; }
    }

    function startAdjust(v) { adjust(v); adjustTimer = setInterval(() => adjust(v), 150); }
    function stopAdjust() { clearInterval(adjustTimer); }
    function adjust(v) { 
        if(tarRPM === 0 && v > 0) tarRPM = 1000;
        tarRPM = Math.max(1000, Math.min(2500, tarRPM + v)); 
        send(tarRPM); 
    }

    function draw() {
        ctx.clearRect(0, 0, 680, 680);
        const x = 340, y = 340, r = 280;
        
        // 배경 가이드
        ctx.strokeStyle = "#333"; ctx.lineWidth = 25; ctx.beginPath(); ctx.arc(x, y, r, 0.75 * Math.PI, 2.25 * Math.PI); ctx.stroke();
        
        // ** Demand RPM Arc (파란색) 복구 **
        if (tarRPM > 0) {
            let tarAngle = (0.75 + (tarRPM / 3000) * 1.5) * Math.PI;
            ctx.strokeStyle = "rgba(0, 122, 255, 0.4)"; ctx.lineWidth = 25;
            ctx.beginPath(); ctx.arc(x, y, r, 0.75 * Math.PI, tarAngle); ctx.stroke();
        }

        // 눈금 및 숫자
        ctx.font = "bold 28px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        for (let i = 0; i <= 30; i++) {
            let ang = (0.75 + (i / 30) * 1.5) * Math.PI;
            let isMajor = i % 5 === 0;
            ctx.strokeStyle = isMajor ? "#fff" : "#555"; ctx.lineWidth = isMajor ? 5 : 2;
            ctx.beginPath();
            ctx.moveTo(x + (r-10)*Math.cos(ang), y + (r-10)*Math.sin(ang));
            ctx.lineTo(x + (r-35)*Math.cos(ang), y + (r-35)*Math.sin(ang));
            ctx.stroke();
            if (isMajor) { ctx.fillStyle = "#fff"; ctx.fillText(i * 100, x + (r-75)*Math.cos(ang), y + (r-75)*Math.sin(ang)); }
        }

        // 실시간 바늘 (빨간색)
        let needleAng = (0.75 + (curRPM / 3000) * 1.5) * Math.PI;
        ctx.strokeStyle = "#ff3b30"; ctx.lineWidth = 12; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.lineTo(x + (r-50)*Math.cos(needleAng), y + (r-50)*Math.sin(needleAng)); ctx.stroke();
        
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, 18, 0, 7); ctx.fill();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
