<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck RPM Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .status { color: #4CAF50; font-size: 14px; margin-bottom: 10px; }
        #connectBtn { background-color: #444; color: white; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 20px auto; }
        .btn { padding: 30px; border-radius: 12px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; color: white; }
        .resume { background-color: #2ecc71; } .up { background-color: #3498db; }
        .stop { background-color: #e74c3c; } .down { background-color: #f39c12; }
        .rpm-text { font-size: 54px; font-weight: bold; color: #3498db; margin-top: -30px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="status" class="status">Disconnected</div>
    <button id="connectBtn">CONNECT</button>

    <canvas id="gauge-rpm"></canvas>
    <div class="rpm-text" id="rpmVal">0</div>

    <div class="grid-container">
        <button class="btn resume" onclick="sendCmd(650)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        var gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 320, height: 320, units: "RPM",
            minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            colorPlate: "#121212", colorMajorTicks: "#ddd", colorNumbers: "#eee",
            needleType: "arrow", needleWidth: 3, valueBox: false, borders: false
        }).draw();

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "Truck_RPM_Control" }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = "Connected";
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    let val = e.target.value.getUint16(0, true);
                    gauge.value = val;
                    document.getElementById('rpmVal').innerText = val;
                });
            } catch (err) { console.log(err); }
        });

        async function sendCmd(val) {
            if (characteristic) {
                await characteristic.writeValue(new Uint16Array([val]));
            }
        }
    </script>
</body>
</html>
