<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck RPM Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .status { color: #4CAF50; font-size: 14px; margin-bottom: 10px; }
        #connectBtn { background-color: #444; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 20px auto; }
        .btn { padding: 25px; border-radius: 12px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; color: white; }
        .resume { background-color: #2ecc71; } .up { background-color: #007bff; }
        .stop { background-color: #e74c3c; } .down { background-color: #f39c12; }
        .baud-container { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .baud-btn { background-color: #333; color: #888; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .baud-btn.active { background-color: #222; color: #007bff; border-color: #007bff; }
        #baudStatus { font-size: 12px; color: #007bff; margin-top: 10px; }
        .rpm-text { font-size: 48px; font-weight: bold; color: #007bff; margin-top: -30px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="status" class="status">연결 안됨</div>
    <button id="connectBtn">CONNECT</button>

    <canvas id="gauge-rpm"></canvas>
    <div class="rpm-text" id="rpmVal">0</div>

    <div class="grid-container">
        <button class="btn resume" onclick="sendCmd(650)">RESUME</button>
        <button class="btn up" onclick="sendCmd(1)">UP</button>
        <button class="btn stop" onclick="sendCmd(600)">STOP</button>
        <button class="btn down" onclick="sendCmd(2)">DOWN</button>
    </div>

    <div id="baudStatus">현재 속도: 확인 중...</div>
    <div class="baud-container">
        <button id="btn250" class="baud-btn" onclick="setBaud(250)">250kbps</button>
        <button id="btn500" class="baud-btn" onclick="setBaud(500)">500kbps</button>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        // Gauge 설정
        var gauge = new RadialGauge({
            renderTo: 'gauge-rpm', width: 300, height: 300, units: "RPM",
            minValue: 0, maxValue: 3000,
            majorTicks: ["0","500","1000","1500","2000","2500","3000"],
            minorTicks: 2, strokeTicks: true,
            highlights: [{ "from": 0, "to": 1000, "color": "rgba(0,0,255,.3)" }],
            colorPlate: "#121212", colorMajorTicks: "#ddd", colorMinorTicks: "#666",
            colorNumbers: "#eee", needleType: "arrow", needleWidth: 3,
            valueBox: false, borderShadowWidth: 0, borders: false,
            animationDuration: 1500, animationRule: "linear"
        }).draw();

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "Truck_RPM_Control" }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = "연결됨: " + device.name;
                document.getElementById('connectBtn').innerText = "DISCONNECT";

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleNotifications);
                
                // 연결 시 현재 상태 요청 (더미 데이터 전송)
                sendCmd(0); 

            } catch (error) {
                console.log(error);
                alert("연결 실패: " + error);
            }
        });

        function handleNotifications(event) {
            let data = event.target.value;
            if (data.byteLength === 4) {
                // RPM 데이터 수신 (Low Byte, High Byte)
                let current = data.getUint16(0, true);
                let target = data.getUint16(2, true);
                gauge.value = current;
                document.getElementById('rpmVal').innerText = current;
            } else if (data.byteLength === 2) {
                // 속도 설정 ACK 수신
                let ack = data.getUint16(0, true);
                updateBaudUI(ack);
            }
        }

        function updateBaudUI(val) {
            const btn250 = document.getElementById('btn250');
            const btn500 = document.getElementById('btn500');
            const status = document.getElementById('baudStatus');

            if (val === 0x2500) {
                btn250.classList.add('active'); btn500.classList.remove('active');
                status.innerText = "현재 속도: 250kbps";
            } else if (val === 0x5000) {
                btn500.classList.add('active'); btn250.classList.remove('active');
                status.innerText = "현재 속도: 500kbps";
            }
        }

        async function sendCmd(val) {
            if (!characteristic) return;
            let data = new Uint16Array([val]);
            await characteristic.writeValue(data);
        }

        function setBaud(baud) {
            if (baud === 250) sendCmd(0x2500);
            else if (baud === 500) sendCmd(0x5000);
        }
    </script>
</body>
</html>
