<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Truck Control</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/gauge.min.js"></script>
    <style>
        body { background:#1a1a1a; color:white; text-align:center; font-family:sans-serif; }
        .btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:400px; margin:20px auto; }
        .btn { padding:30px; border-radius:15px; border:none; color:white; font-size:20px; font-weight:bold; cursor:pointer; }
        .resume { background:#27ae60; } .up { background:#2980b9; }
        .stop { background:#c0392b; } .down { background:#f39c12; }
        #conn { background:#444; color:white; padding:10px 20px; border-radius:5px; border:none; margin:20px; }
    </style>
</head>
<body>
    <button id="conn" onclick="connect()">CONNECT</button>
    <canvas id="gauge"></canvas>
    <h1 id="rpm">0 RPM</h1>

    <div class="btn-grid">
        <button class="btn resume" onclick="send(650)">RESUME</button>
        <button class="btn up" onclick="send(1)">UP</button>
        <button class="btn stop" onclick="send(600)">STOP</button>
        <button class="btn down" onclick="send(2)">DOWN</button>
    </div>

    <script>
        let char;
        var gauge = new RadialGauge({
            renderTo:'gauge', width:300, height:300, minValue:0, maxValue:3000,
            colorPlate:'#1a1a1a', colorNumbers:'#eee', needleType:'arrow'
        }).draw();

        async function connect() {
            const dev = await navigator.bluetooth.requestDevice({
                filters:[{name:"Truck_RPM_Control"}],
                optionalServices:["4fafc201-1fb5-459e-8fcc-c5c9c331914b"]
            });
            const server = await dev.gatt.connect();
            const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
            char = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
            
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', e => {
                let d = e.target.value;
                let rpm = d.getUint16(0, true);
                gauge.value = rpm;
                document.getElementById('rpm').innerText = rpm + " RPM";
            });
            document.getElementById('conn').innerText = "CONNECTED";
        }

        async function send(v) {
            if(char) await char.writeValue(new Uint16Array([v]));
        }
    </script>
</body>
</html>
